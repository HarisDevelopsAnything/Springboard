# ===================================================================
# WellNest Fitness App - Application Configuration
# ===================================================================

# Server
server.port=8080

# MongoDB Database
spring.data.mongodb.uri=mongodb+srv://wellnest_user:Harishk.j12@cluster0.y3snqo0.mongodb.net/wellnest_db?retryWrites=true&w=majority


# JWT Configuration
app.jwt.secret=${JWT_SECRET:DefaultDevSecretKeyChangeThisInProduction2026}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Load secrets from a gitignored file if present (optional)
# Create `src/main/resources/application-secrets.properties` or place on classpath
spring.config.import=optional:classpath:application-secrets.properties

# ===================================================================
# Email / SMTP Configuration (Gmail)
# ===================================================================
# To use Gmail SMTP, you need a Google App Password:
# 1. Go to https://myaccount.google.com/security
# 2. Enable 2-Step Verification
# 3. Search "App Passwords" → Generate one for "Mail"
# 4. Replace these values with your credentials
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
# Set actual username/password via environment variables or application-secrets.properties (gitignored)
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}
app.mail.from=${APP_MAIL_FROM:WellNest <no-reply@wellnest.local>}

# OTP Configuration
app.otp.expiration-minutes=5
app.otp.length=6
